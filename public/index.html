<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Blue Rise</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="card">
        <h2>Blue Rise</h2>
        <div id="auth-form">
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">
            <button onclick="entrar()">Login</button>
            <button onclick="cadastrar()" style="background-color: #28a745; margin-top: 5px;">Criar Conta</button>
        </div>
        <div id="logged-in" style="display: none;">
            <p style="color: green; font-weight: bold;">✅ Você está logado!</p>
            <button class="logout" id="btnLogout" onclick="sair()" style="display: block;">Sair (Logout)</button>
        </div>
        <p id="msg"></p>
    </div>

    <script>
        const msgElement = document.getElementById('msg');

        // --- AJUSTE ESTES DOIS VALORES ---
        const BASE_URL = 'https://desafio-bluerise-production.up.railway.app';
        const API_KEY = 'api_key123'; // Deve ser igual ao que está no Railway

        async function entrar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            msgElement.innerText = "Carregando...";

            try {
                const response = await fetch(`https://desafio-bluerise-production.up.railway.app/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    showLoggedIn(true);
                    msgElement.innerText = "Login realizado!";
                    msgElement.style.color = "green";
                } else {
                    msgElement.innerText = "Erro: " + (data.error || "Falha no login");
                    msgElement.style.color = "red";
                }
            } catch (err) {
                msgElement.innerText = "Erro ao conectar. Verifique se a API está online.";
                msgElement.style.color = "red";
            }
        }

        async function cadastrar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`https://desafio-bluerise-production.up.railway.app/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    msgElement.innerText = "Cadastrado! Faça o login.";
                    msgElement.style.color = "blue";
                } else {
                    msgElement.innerText = "Erro: " + data.error;
                    msgElement.style.color = "red";
                }
            } catch (err) {
                msgElement.innerText = "Erro ao cadastrar.";
                msgElement.style.color = "red";
            }
        }

        async function sair() {
            const token = localStorage.getItem('token');
            try {
                await fetch(`https://desafio-bluerise-production.up.railway.app/logout`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'x-api-key': API_KEY
                    }
                });
            } catch (err) { }
            localStorage.clear();
            location.reload();
        }

        function showLoggedIn(isLoggedIn) {
            document.getElementById('auth-form').style.display = isLoggedIn ? 'none' : 'block';
            document.getElementById('logged-in').style.display = isLoggedIn ? 'block' : 'none';
        }

        if (localStorage.getItem('token')) showLoggedIn(true);
    </script>
</body>

</html>
